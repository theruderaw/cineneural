<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineNeural | Movie Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: { 950: '#050505' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .shine-effect {
            background: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
        }
        .glossy-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-reveal { animation: reveal 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen selection:bg-white/20 shine-effect overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none -z-10">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[800px] bg-white/5 blur-[150px] opacity-30"></div>
    </div>

    <div class="container mx-auto px-6 max-w-5xl relative z-10 pt-16 pb-32">
        <a href="/" class="group inline-flex items-center gap-3 text-zinc-500 hover:text-white transition-all mb-12">
            <div class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center group-hover:border-white/30 group-hover:-translate-x-1 transition-all">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </div>
            <span class="text-xs font-black uppercase tracking-widest">Return to Dashboard</span>
        </a>

        <div id="detail-loader" class="py-32 text-center animate-pulse">
            <span class="text-zinc-700 text-[10px] font-black uppercase tracking-[0.5em]">Synchronizing Neural Data...</span>
        </div>

        <main id="movie-content" class="hidden animate-reveal">
            <div class="mb-16">
                <div id="genre-container" class="flex flex-wrap gap-2 mb-6"></div>
                <h1 id="movie-title" class="text-6xl md:text-8xl font-black text-white tracking-tighter mb-4 leading-none"></h1>
                <div id="movie-meta-header" class="text-sm font-bold text-zinc-500 uppercase tracking-widest border-l-2 border-white/20 pl-4"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                <!-- Plot Section -->
                <div class="lg:col-span-8">
                    <div class="bg-zinc-950/40 border border-white/5 rounded-[3rem] p-10 md:p-12 glossy-panel">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-600 mb-8 pb-4 border-b border-white/5">Thematic Plot Summary</h3>
                        <p id="movie-plot" class="text-lg md:text-xl text-zinc-300 font-light leading-relaxed"></p>
                    </div>
                </div>

                <!-- Secondary Metadata -->
                <div class="lg:col-span-4 space-y-8">
                    <div class="bg-zinc-950/20 border border-white/5 rounded-[2rem] p-8">
                        <h4 class="text-[9px] font-black uppercase tracking-widest text-white mb-4">Auteur</h4>
                        <p id="movie-director" class="text-zinc-400 font-medium"></p>
                    </div>
                    <div class="bg-zinc-950/20 border border-white/5 rounded-[2rem] p-8">
                        <h4 class="text-[9px] font-black uppercase tracking-widest text-white mb-4">Ensemble</h4>
                        <p id="movie-cast" class="text-zinc-400 font-medium leading-relaxed"></p>
                    </div>
                    <div class="bg-zinc-950/20 border border-white/5 rounded-[2rem] p-8">
                        <h4 class="text-[9px] font-black uppercase tracking-widest text-white mb-4">Geographic Index</h4>
                        <p id="movie-origin" class="text-zinc-400 font-medium"></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 p-8 backdrop-blur-xl border-t border-white/5 flex justify-between items-center z-50 pointer-events-none opacity-20">
        <p class="text-[9px] font-black uppercase tracking-[0.5em] text-zinc-700">Detail Core 4.1.0</p>
    </footer>

    <script src="static/details.js"></script>
</body>
</html>
