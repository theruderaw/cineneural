<!DOCTYPE html>
<html lang="en" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineNeural | AI Movie Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFFFFF',
                        zinc: {
                            950: '#050505',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .shine-effect {
            background: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
        }
        .glossy-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        @keyframes reveal { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-reveal { animation: reveal 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen selection:bg-white/20 custom-scrollbar shine-effect overflow-x-hidden">

    <!-- Global Background Elements -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[800px] bg-white/5 blur-[150px] opacity-30"></div>
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')] opacity-10"></div>
    </div>

    <div class="container mx-auto px-6 max-w-7xl relative z-10">
        <header class="pt-24 pb-20 text-center tracking-tight">
            <h1 class="text-7xl md:text-8xl font-black text-white uppercase tracking-tighter drop-shadow-[0_0_30px_rgba(255,255,255,0.2)] transition-all hover:scale-105 duration-700">
                CINEN&Eacute;URAL
            </h1>
            <div class="h-px w-24 bg-white mx-auto my-6 opacity-20"></div>
            <p class="text-zinc-500 font-medium tracking-[0.3em] text-[10px] uppercase">Neural Latent Space &bull; Feature Mapping v4.1</p>
        </header>

        <!-- Dynamic Prompt Section -->
        <section class="max-w-2xl mx-auto mb-32 group">
            <div class="relative">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-white to-zinc-700 rounded-full blur opacity-10 group-focus-within:opacity-20 transition duration-1000"></div>
                <div class="relative flex items-center bg-zinc-950/90 border border-white/5 rounded-full pl-8 pr-2 py-2 shadow-[0_20px_50px_rgba(0,0,0,0.9)] backdrop-blur-2xl">
                    <input type="text" id="movie-input" 
                        class="bg-transparent border-none text-white text-lg w-full outline-none placeholder:text-zinc-700 font-light" 
                        placeholder="Search the neural dataset..." autoFocus autocomplete="off">
                    <button id="search-btn" 
                        class="bg-white hover:bg-zinc-200 text-black font-black text-xs px-8 py-3 rounded-full transition-all active:scale-95 shadow-lg shadow-white/5 uppercase tracking-widest">
                        Execute
                    </button>
                </div>
                <!-- Autocomplete Dropdown -->
                <div id="autocomplete-results" 
                    class="absolute top-full left-0 right-0 mt-6 bg-zinc-950/95 border border-white/10 rounded-[2rem] overflow-hidden hidden shadow-[0_30px_60px_rgba(0,0,0,1)] z-50 custom-scrollbar max-h-96 backdrop-blur-3xl glossy-panel">
                </div>
            </div>
        </section>

        <!-- AI Logic Controls (Dashboard) -->
        <section id="controls-panel" class="hidden mb-24 animate-reveal">
            <div class="bg-zinc-950/60 border border-white/5 rounded-[3rem] p-10 md:p-16 glossy-panel shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-8">
                    <div class="flex items-center gap-3 bg-zinc-900/50 px-4 py-2 rounded-full border border-white/5">
                        <span id="logic-status" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Calibration Ready</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-white shadow-[0_0_10px_rgba(255,255,255,0.5)]"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-16">
                    <!-- Column 1: Semantic Core -->
                    <div class="lg:col-span-5 space-y-12">
                        <div class="inline-block px-3 py-1 mb-4 rounded-md bg-white/5 border border-white/10">
                            <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-white">01 &bull; Semantic Core</h4>
                        </div>
                        <div class="space-y-10">
                            <div class="group">
                                <div class="flex justify-between items-end mb-4">
                                    <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Scenario Weight</label>
                                    <span class="text-lg font-black text-white" id="val-plot">45<small class="text-zinc-600 text-xs ml-1 font-normal">%</small></span>
                                </div>
                                <input type="range" id="w-plot" min="0" max="100" value="45" class="w-full h-1 bg-zinc-900 rounded-lg appearance-none cursor-pointer accent-white transition-all">
                            </div>
                            <div class="group">
                                <div class="flex justify-between items-end mb-4">
                                    <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Conceptual Bias</label>
                                    <span class="text-lg font-black text-white" id="val-concept">10<small class="text-zinc-600 text-xs ml-1 font-normal">%</small></span>
                                </div>
                                <input type="range" id="w-concept" min="0" max="100" value="10" class="w-full h-1 bg-zinc-900 rounded-lg appearance-none cursor-pointer accent-zinc-500">
                            </div>
                        </div>
                    </div>

                    <!-- Column 2: Metadata Prior -->
                    <div class="lg:col-span-7 space-y-12 border-l border-white/5 pl-16">
                        <div class="inline-block px-3 py-1 mb-4 rounded-md bg-zinc-800/40 border border-white/5">
                            <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">02 &bull; Contextual Tuning</h4>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <div class="space-y-10">
                                <div>
                                    <div class="flex justify-between items-end mb-4">
                                        <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Regional</label>
                                        <span class="text-xs font-bold" id="val-origin">10</span>
                                    </div>
                                    <input type="range" id="w-origin" min="0" max="100" value="10" class="w-full h-0.5 bg-zinc-900 appearance-none cursor-pointer accent-white">
                                </div>
                                <div>
                                    <div class="flex justify-between items-end mb-4">
                                        <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Era</label>
                                        <span class="text-xs font-bold" id="val-year">10</span>
                                    </div>
                                    <input type="range" id="w-year" min="0" max="100" value="10" class="w-full h-0.5 bg-zinc-900 appearance-none cursor-pointer accent-white">
                                </div>
                            </div>
                            <div class="space-y-10">
                                <div>
                                    <div class="flex justify-between mb-4">
                                        <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Auteur Link</label>
                                        <label class="relative inline-flex items-center cursor-pointer group">
                                            <input type="checkbox" id="w-dir-toggle" checked class="sr-only peer">
                                            <div class="w-11 h-6 bg-zinc-900 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-zinc-700 after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-white/20 peer-checked:after:bg-white shadow-inner"></div>
                                        </label>
                                    </div>
                                </div>
                                <div>
                                    <div class="flex justify-between items-end mb-4">
                                        <label class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Genre Filter</label>
                                        <span class="text-xs font-bold" id="val-genre">15</span>
                                    </div>
                                    <input type="range" id="w-genre" min="0" max="100" value="15" class="w-full h-0.5 bg-zinc-900 appearance-none cursor-pointer accent-white">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Dynamic Results Grid -->
        <main id="results-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 pb-48"></main>

        <div id="loader" class="hidden py-12 text-center">
            <div class="flex justify-center gap-1 mb-4">
                <div class="w-1.5 h-1.5 bg-white animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-white animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-1.5 h-1.5 bg-white animate-bounce [animation-delay:-0.3s]"></div>
            </div>
            <span class="text-zinc-700 text-[10px] font-black uppercase tracking-[0.5em] regular">Synthesizing Neural Result...</span>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 p-8 backdrop-blur-xl border-t border-white/5 flex justify-between items-center z-50 pointer-events-none">
        <p class="text-[9px] font-black uppercase tracking-[0.5em] text-zinc-700">Inference Core 4.1.0</p>
        <p class="text-[9px] font-bold text-zinc-800">CINEN&Eacute;URAL &copy; 2026</p>
    </footer>

    <script src="static/script.js"></script>
</body>
</html>
